<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fitify — Muscle Wiki</title>
  <meta name="description" content="Explore targeted exercises for every muscle group with Fitify Muscle Wiki. Watch curated YouTube videos for Chest, Back, Biceps, Triceps, Shoulders, Legs and Abs." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="./assets/muscleWiki-DAFrmeNp.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/modulepreload-polyfill-myak50gs.js">
  <link rel="stylesheet" crossorigin href="./assets/muscleWiki-FcrB1KLt.css">
</head>
<body>

  <!-- ===== TOP BAR ===== -->
  <header class="topbar" id="topbar">
    <div class="topbar__left">
      <button id="backBtn" class="btn-back" aria-label="Back to Fitify">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        <span id="backBtnText">Back to Fitify</span>
      </button>
    </div>

    <div class="topbar__center">
      <div class="brand">
        <svg class="brand-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#a855f7"/><stop offset="100%" style="stop-color:#6366f1"/></linearGradient></defs>
          <path d="M18 8a6 6 0 0 0-6-6 6 6 0 0 0-6 6c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="brand-text">Fitify</span>
      </div>
      <div id="siteTitle" class="site-title">Muscle Wiki</div>
    </div>

    <div class="topbar__right">
      <!-- Language toggle -->
      <div class="control-group" id="langControl">
        <span class="control-label" id="langLabel">AR</span>
        <label class="toggle" for="langToggle">
          <input type="checkbox" id="langToggle" />
          <span class="track"><span class="knob"></span></span>
        </label>
        <span class="control-label" id="langLabel2">EN</span>
      </div>
      <!-- Theme button -->
      <button id="themeBtn" class="btn-icon" aria-label="Toggle theme">
        <svg id="themeSun" class="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="themeMoon" class="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="main">
    <!-- Hero -->
    <section class="hero">
      <h1 id="heroTitle" class="hero__title">Muscle Wiki</h1>
      <p id="heroDesc" class="hero__desc">Interactive muscle wiki & exercise videos.</p>
    </section>

    <!-- Content: sidebar + panel -->
    <section class="content">
      <!-- Sidebar / Muscle list -->
      <nav class="sidebar" id="muscleList" aria-label="Muscle groups">
        <button class="muscle-btn" data-en="Chest" data-ar="الصدر">
          <span class="muscle-btn__label">Chest</span>
        </button>
        <button class="muscle-btn" data-en="Back" data-ar="الظهر">
          <span class="muscle-btn__label">Back</span>
        </button>
        <button class="muscle-btn" data-en="Biceps" data-ar="بايسبس">
          <span class="muscle-btn__label">Biceps</span>
        </button>
        <button class="muscle-btn" data-en="Triceps" data-ar="ترايسبس">
          <span class="muscle-btn__label">Triceps</span>
        </button>
        <button class="muscle-btn" data-en="Shoulders" data-ar="الأكتاف">
          <span class="muscle-btn__label">Shoulders</span>
        </button>
        <button class="muscle-btn" data-en="Legs" data-ar="الأرجل">
          <span class="muscle-btn__label">Legs</span>
        </button>
        <button class="muscle-btn" data-en="Abs" data-ar="البطن">
          <span class="muscle-btn__label">Abs</span>
        </button>
      </nav>

      <!-- Panel -->
      <div class="panel">
        <div class="panel__header">
          <span class="panel__label" id="panelLabel">Selected Muscle</span>
          <h2 id="selectedTitle" class="panel__title">
            <svg class="panel__title-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            <span id="selectedTitleText">None</span>
          </h2>
        </div>

        <div id="videos" class="videos">
          <div class="videos__empty" id="emptyState">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.35"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            <p id="emptyText">Choose a muscle group to see exercises</p>
          </div>
        </div>
      </div>
    </section>
  </main>

<script>
document.getElementById('backBtn').onclick = () => {
  window.location.href = 'index.html';
};
</script>
</body>
</html>
